---
title: Contact
---
<h1>Contacte</h1>
<p class="editable"> Envia'm qualsevol dubte sobre les receptes</p>

<form method="post" action="{{ site.baseurl }}/contact-success/">
		<input type="hidden" name="_to" value="{{ site.data.email }}" />
		<input type="text" name="_gotcha" style="display: none;">

	<div class="contain">
		<div class="split">
			<label for="first-name">Nom</label>
			<input type="text" name="first-name" id="first-name" />
		</div>
		<div class="split">
			<label for="surname">Cognoms</label>
			<input type="text" name="surname" id="surname" />
		</div>
	</div>

	<div class="contain">
		<div class="split">
			<label for="email">Correu electrònic</label>
			<input type="email" name="email" id="email" required />
		</div>

		<div class="split">
			<label for="subject">Tema</label>
			<select id="subject" name="subject">
				<option value="enquiry">Dubte</option>
				<option value="suggestion">Suggerència</option>
				<option value="other">Altres</option>
			</select>
		</div>
	</div>

	<label for="message">Missatge</label>
	<textarea name="message" id="message"></textarea>

	<input type="submit" value="Send Message" />
</form>
